<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f8fa"/>
      <stop offset="40%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f6f8fa"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <linearGradient id="subtleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0969da;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0969da;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0969da;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="6"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="899" height="199" fill="none" stroke="#d0d7de" stroke-width="1" rx="6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#0969da" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Decorative nodes (computation graph motif) -->
  <g opacity="0.1" fill="#0969da">
    <circle cx="80" cy="50" r="3"/>
    <circle cx="160" cy="35" r="2"/>
    <circle cx="120" cy="70" r="2.5"/>
    <circle cx="780" cy="60" r="3"/>
    <circle cx="830" cy="40" r="2"/>
    <circle cx="810" cy="80" r="2.5"/>
    <circle cx="60" cy="150" r="2"/>
    <circle cx="140" cy="160" r="3"/>
    <circle cx="760" cy="150" r="2.5"/>
    <circle cx="850" cy="140" r="2"/>
  </g>
  <g opacity="0.06" stroke="#0969da" stroke-width="0.5">
    <line x1="80" y1="50" x2="160" y2="35"/>
    <line x1="80" y1="50" x2="120" y2="70"/>
    <line x1="160" y1="35" x2="120" y2="70"/>
    <line x1="780" y1="60" x2="830" y2="40"/>
    <line x1="780" y1="60" x2="810" y2="80"/>
    <line x1="830" y1="40" x2="810" y2="80"/>
    <line x1="60" y1="150" x2="140" y2="160"/>
    <line x1="760" y1="150" x2="850" y2="140"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentGrad)" rx="6"/>

  <!-- Subtle horizontal glow -->
  <rect x="0" y="96" width="900" height="8" fill="url(#subtleGrad)"/>

  <!-- Main title -->
  <text x="450" y="90" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#1f2328" text-anchor="middle" letter-spacing="8">AETHELRED</text>

  <!-- Tagline -->
  <text x="450" y="130" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#656d76" text-anchor="middle" letter-spacing="5">SOVEREIGN LAYER 1 FOR VERIFIABLE AI</text>

  <!-- Feature pills -->
  <text x="450" y="165" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="11" fill="#0969da" text-anchor="middle" letter-spacing="2" opacity="0.7">PoUW  ·  zkML  ·  TEE  ·  POST-QUANTUM  ·  IBC</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="197" width="900" height="3" fill="url(#accentGrad)" rx="6"/>
</svg>
